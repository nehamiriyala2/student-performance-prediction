<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prediction Result</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#2563eb,#06b6d4);
        }

        .container{
            background:white;
            width:450px;
            padding:40px;
            border-radius:20px;
            text-align:center;
            box-shadow:0 10px 30px rgba(0,0,0,0.2);
        }

        h1{
            color:#111827;
            margin-bottom:20px;
        }

        .score{
            font-size:70px;
            font-weight:bold;
            color:#2563eb;
            margin:20px 0;
        }

        .status{
            padding:12px;
            border-radius:12px;
            font-size:18px;
            font-weight:bold;
            margin-bottom:20px;
        }

        .excellent{
            background:#dcfce7;
            color:#166534;
        }

        .good{
            background:#dbeafe;
            color:#1d4ed8;
        }

        .average{
            background:#fee2e2;
            color:#b91c1c;
        }

        .btn{
            display:inline-block;
            padding:12px 25px;
            background:#2563eb;
            color:white;
            text-decoration:none;
            border-radius:10px;
            margin-top:15px;
        }

    </style>

</head>

<body>

    <div class="container">

        <h1>Prediction Result</h1>

        <div class="score">
            {{ results }}
        </div>

        {% if results|float >= 90 %}
            <div class="status excellent">
                Excellent Performance
            </div>

        {% elif results|float >= 70 %}
            <div class="status good">
                Good Performance
            </div>

        {% else %}
            <div class="status average">
                Needs Improvement
            </div>
        {% endif %}

        <a href="/predictdata" class="btn">
            Predict Again
        </a>

    </div>

</body>
</html>
